<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>X Following Auto Pin Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <div>
        <h1 data-i18n="title">X Following Auto Pin</h1>
        <p class="description" data-i18n="description">XのホームタイムラインをFollowingと最新表示に固定します。</p>
      </div>

      <label class="language">
        <span data-i18n="languageLabel">表示言語</span>
        <select id="languageSelect">
          <option value="auto">Auto</option>
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </label>
    </header>

    <section class="card">
      <label class="option-row">
        <input type="checkbox" id="enableFollowingPin">
        <span>
          <strong data-i18n="followingTitle">Following固定を有効にする</strong>
          <small data-i18n="followingHelp">For you / おすすめ が選択中の場合、Following / フォロー中 に戻します。</small>
        </span>
      </label>

      <label class="option-row">
        <input type="checkbox" id="enableRecentPin">
        <span>
          <strong data-i18n="recentTitle">最新 / 時系列固定を有効にする</strong>
          <small data-i18n="recentHelp">人気が選択されている場合だけ、1回だけメニューを開いて最新 / Latest に戻します。</small>
        </span>
      </label>

      <label class="option-row">
        <input type="checkbox" id="enableLightLogging">
        <span>
          <strong data-i18n="loggingTitle">軽量ログを有効にする</strong>
          <small data-i18n="loggingHelp">動作確認用にConsoleへ最小限のログを出します。通常はOFF推奨です。</small>
        </span>
      </label>
    </section>

    <p id="statusText" class="status" aria-live="polite"></p>
  </main>

  <script src="options.js"></script>
</body>
</html>
